version: "3.9"

services:
  mongo:
    image: mongo:7.0
    container_name: btg-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: btg_funds

  btg-funds-api:
    build: .
    container_name: btg-funds-api
    depends_on:
      - mongo
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      MONGODB_URI: mongodb://mongo:27017/btg_funds
      JWT_SECRET: 12345678901234567890123456789012
      JWT_EXPIRATION_MS: 86400000