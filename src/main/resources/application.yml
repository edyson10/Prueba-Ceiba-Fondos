server:
  port: 8080

spring:
  application:
    name: btg-funds-api

  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/btg_funds}

  jackson:
    serialization:
      write-dates-as-timestamps: false

logging:
  level:
    root: INFO
    org.springframework.security: INFO
    org.springframework.web: INFO

security:
  jwt:
    secret: ${JWT_SECRET:12345678901234567890123456789012}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}

app:
  initial-balance: 500000

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html